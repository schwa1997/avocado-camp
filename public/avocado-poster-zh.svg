<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052e16" />
      <stop offset="45%" stop-color="#0b3b1d" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity="0.35" />
    </filter>
    <style>
      .font { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Source Han Sans SC", system-ui, -apple-system, Segoe UI, Roboto, Arial; }
      .muted { fill: rgba(255,255,255,0.78); }
      .muted2 { fill: rgba(255,255,255,0.64); }
      .white { fill: #ffffff; }
      .chip { fill: rgba(255,255,255,0.10); stroke: rgba(255,255,255,0.18); }
    </style>
  </defs>

  <rect x="0" y="0" width="1080" height="1350" fill="url(#bg)" />

  <!-- subtle blobs -->
  <circle cx="220" cy="240" r="260" fill="#22c55e" opacity="0.16" />
  <circle cx="980" cy="200" r="280" fill="#38bdf8" opacity="0.10" />
  <circle cx="860" cy="1180" r="340" fill="#a78bfa" opacity="0.10" />

  <!-- top bar -->
  <rect x="72" y="72" width="936" height="94" rx="28" class="chip" />
  <rect x="92" y="94" width="168" height="50" rx="999" fill="url(#accent)" opacity="0.95" />
  <text x="176" y="128" text-anchor="middle" class="font" font-size="24" font-weight="800" fill="#052e16">海报</text>
  <text x="300" y="130" class="font muted" font-size="26" font-weight="700">牛油果英语训练培训营</text>

  <!-- main card -->
  <g filter="url(#softShadow)">
    <rect x="72" y="204" width="936" height="934" rx="44" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)" />
  </g>

  <!-- headline -->
  <text x="120" y="320" class="font white" font-size="64" font-weight="900" letter-spacing="-1">英语远程工作</text>
  <text x="120" y="390" class="font muted" font-size="40" font-weight="800">更好的时薪 · 更好的工作机会</text>

  <!-- bullets -->
  <g class="font" font-size="30" font-weight="700">
    <circle cx="132" cy="476" r="7" fill="#22c55e" />
    <text x="154" y="486" class="muted">外企：更成熟的企业文化与协作方式</text>

    <circle cx="132" cy="536" r="7" fill="#22c55e" />
    <text x="154" y="546" class="muted">英语口语：开会、评审、计划、面试都能说清楚</text>

    <circle cx="132" cy="596" r="7" fill="#22c55e" />
    <text x="154" y="606" class="muted">简单英语：不用复杂词汇，也能表达专业</text>
  </g>

  <!-- divider -->
  <rect x="120" y="660" width="840" height="1" fill="rgba(255,255,255,0.16)" />

  <!-- program -->
  <text x="120" y="732" class="font white" font-size="40" font-weight="900">一个月英语口语训练</text>
  <text x="120" y="782" class="font muted2" font-size="28" font-weight="650">以口语为主：句型 + 真实场景练习 + 反馈纠正 + 重复巩固</text>

  <!-- price -->
  <g>
    <rect x="120" y="836" width="520" height="132" rx="28" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.16)" />
    <text x="152" y="892" class="font muted2" font-size="22" font-weight="800" letter-spacing="2">价格</text>
    <text x="152" y="944" class="font white" font-size="56" font-weight="950">¥999</text>
    <text x="312" y="944" class="font muted" font-size="26" font-weight="800">/ 1 个月</text>
    <text x="152" y="980" class="font muted2" font-size="20" font-weight="650">（开发者口语训练营）</text>
  </g>

  <!-- QR placeholder -->
  <g>
    <rect x="684" y="836" width="276" height="276" rx="28" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.16)" />
    <rect x="720" y="872" width="204" height="204" rx="18" fill="rgba(0,0,0,0.24)" stroke="rgba(255,255,255,0.14)" />
    <text x="822" y="954" text-anchor="middle" class="font" font-size="22" font-weight="850" fill="rgba(255,255,255,0.85)">二维码</text>
    <text x="822" y="986" text-anchor="middle" class="font" font-size="16" font-weight="650" fill="rgba(255,255,255,0.62)">放微信/报名链接</text>
    <text x="822" y="1102" text-anchor="middle" class="font" font-size="20" font-weight="800" fill="rgba(255,255,255,0.80)">扫码咨询</text>
  </g>

  <!-- footer inside card -->
  <text x="120" y="1108" class="font muted2" font-size="18" font-weight="650">提示：把你的邮箱/微信二维码替换到右侧区域后即可直接转发</text>

  <!-- bottom footer -->
  <text x="72" y="1270" class="font" font-size="18" font-weight="650" fill="rgba(255,255,255,0.55)">© 牛油果英语训练培训营 · 可下载 SVG 海报用于分享</text>
</svg>